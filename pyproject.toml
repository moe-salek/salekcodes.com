[tool.ruff]
target-version = "py313"

line-length = 120
indent-width = 4
exclude = [
  # ruff:
  ".bzr",
  ".coverage",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".ipynb_checkpoints",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pyenv",
  ".pytest_cache",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".venv",
  ".vscode",
  "__pypackages__",
  "_build",
  # custom fields:
  "blib2to3",
  "buck-out",
  "build",
  "dist",
  "env",
  "manage.py",
  "node_modules",
  "site-packages",
  "tests/data",
  "venv",
]
format.indent-style = "space"
format.quote-style = "single"
format.line-ending = "auto"
format.skip-magic-trailing-comma = true
lint.select = [
  "E4",
  "E7",
  "E9",
  "F",
]
lint.ignore = [
]

lint.fixable = [
  "ALL",
]
lint.unfixable = [
]
# Allow unused variables when underscore-prefixed.
lint.dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.pytest.ini_options]
testpaths = "./tests"
DJANGO_SETTINGS_MODULE = "tests.test_settings"
addopts = "--strict-markers"

[tool.typos]
files.extend-exclude = [
  ".gitignore",
]
